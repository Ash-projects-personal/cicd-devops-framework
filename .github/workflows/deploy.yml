name: Reusable CI/CD pipeline

# Reusable end-to-end pipeline: security scans -> build & test -> terraform -> ECR/ECS deploy.
# Designed to be called from a consumer repo via `uses: <owner>/cicd-devops-framework/.github/workflows/deploy.yml@main`.

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version for the build-and-test job
        required: false
        type: string
        default: "3.11"
      ecr-repository:
        description: ECR repository name to push images to
        required: true
        type: string
      ecs-cluster:
        description: ECS cluster name to update
        required: true
        type: string
      ecs-service:
        description: ECS service name to update
        required: true
        type: string
      aws-region:
        description: AWS region for ECR / ECS / Terraform
        required: false
        type: string
        default: us-east-1
      coverage-threshold:
        description: Minimum pytest coverage percentage
        required: false
        type: number
        default: 85
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run SonarQube SAST
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://staging-env.internal"
        continue-on-error: true

  build-and-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 bandit

      - name: Flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Bandit
        run: bandit -r src/ || true

      - name: pytest with coverage gate
        run: pytest tests/ --cov=src --cov-fail-under=${{ inputs.coverage-threshold }}

  infrastructure-provision:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform plan -out=tfplan
      - run: terraform apply -auto-approve tfplan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy:
    needs: infrastructure-provision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws-region }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ inputs.ecr-repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ inputs.ecs-cluster }} \
            --service ${{ inputs.ecs-service }} \
            --force-new-deployment
