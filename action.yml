name: "DevSecOps build + scan"
description: >-
  Composite action: install Python deps, run flake8/bandit, run pytest with a
  coverage gate, and (optionally) run SonarQube SAST. Use this inside a job's
  steps when you want the scan-and-test portion without the deploy stages from
  the reusable workflow at .github/workflows/deploy.yml.

inputs:
  python-version:
    description: Python version to set up
    required: false
    default: "3.11"
  coverage-threshold:
    description: Minimum pytest coverage percentage
    required: false
    default: "85"
  sonar-host-url:
    description: SonarQube host URL (skip step if empty)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install deps
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 bandit

    - name: Flake8
      shell: bash
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Bandit
      shell: bash
      run: bandit -r src/ || true

    - name: pytest with coverage gate
      shell: bash
      run: pytest tests/ --cov=src --cov-fail-under=${{ inputs.coverage-threshold }}

    - name: SonarQube
      if: inputs.sonar-host-url != ''
      uses: sonarsource/sonarqube-scan-action@v2
      env:
        SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
        SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
